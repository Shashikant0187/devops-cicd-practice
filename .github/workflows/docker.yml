name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set Image Tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t shashikant0187/devops-app:$IMAGE_TAG ./app
          docker tag shashikant0187/devops-app:$IMAGE_TAG shashikant0187/devops-app:latest

      - name: Push Docker Image
        run: |
          docker push shashikant0187/devops-app:$IMAGE_TAG
          docker push shashikant0187/devops-app:latest
